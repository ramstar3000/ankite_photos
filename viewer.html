<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>Your Photos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="app">

    <div id="viewer-header">
      <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Upload More
      </a>
      <h1>Your Photos</h1>
      <p id="viewer-count"></p>
    </div>

    <div id="empty-state" class="hidden">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <p>No photos uploaded from this device yet.</p>
      <a href="index.html" class="empty-link">Upload Photos</a>
    </div>

    <div id="photo-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
      <button id="lightbox-close">&times;</button>
      <button id="lightbox-prev">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="lightbox-next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
      <div id="lightbox-content">
        <img id="lightbox-img" src="" alt="">
      </div>
      <div id="lightbox-info">
        <span id="lightbox-name"></span>
        <span id="lightbox-meta"></span>
      </div>
      <div id="lightbox-actions"></div>
    </div>

  </div>

  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
  <script src="config.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
