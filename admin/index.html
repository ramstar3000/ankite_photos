<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>Admin - Photo Manager</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../viewer.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app">

    <!-- Admin Login -->
    <div id="admin-login">
      <div class="lock-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Admin Access</h1>
      <p>Enter the admin code to manage photos</p>
      <form id="admin-form">
        <input type="password" id="admin-input" placeholder="Admin code" autocomplete="off">
        <button type="submit">Enter</button>
      </form>
      <p id="admin-error" class="error hidden">Incorrect admin code.</p>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden">
      <div id="viewer-header">
        <div class="admin-header-row">
          <h1 id="viewer-title">All Photos <span class="admin-badge">Admin</span></h1>
        </div>
        <p id="viewer-count"></p>
        <p id="viewer-loading" class="hidden">Loading photos from cloud...</p>
      </div>

      <div id="empty-state" class="hidden">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <p>No photos in the bucket yet.</p>
      </div>

      <div id="photo-grid"></div>

      <!-- Lightbox -->
      <div id="lightbox" class="hidden">
        <button id="lightbox-close">&times;</button>
        <button id="lightbox-prev">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button id="lightbox-next">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
        <div id="lightbox-content">
          <img id="lightbox-img" src="" alt="">
        </div>
        <div id="lightbox-info">
          <span id="lightbox-name"></span>
          <span id="lightbox-meta"></span>
        </div>
        <div id="lightbox-actions">
          <button id="lightbox-delete" class="danger-btn">Delete Photo</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
  <script src="../config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
