<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Upload Photos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Password Gate -->
    <div id="password-section">
      <div class="lock-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Welcome!</h1>
      <p>Enter the code to upload your photos</p>
      <form id="password-form">
        <input type="password" id="password-input" placeholder="Enter code" autocomplete="off">
        <button type="submit">Enter</button>
      </form>
      <p id="password-error" class="error hidden">Incorrect code, please try again.</p>
    </div>

    <!-- Upload Area -->
    <div id="upload-section" class="hidden">
      <div id="event-info">
        <h1>Share Your Photos</h1>
        <p>Upload your photos and videos below so we can treasure these memories together.</p>
      </div>

      <div id="drop-zone">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drag & drop photos here</p>
        <input type="file" id="file-input" multiple accept="image/*,video/*">
      </div>

      <div id="action-buttons">
        <button id="choose-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          Choose Files
        </button>
        <button id="camera-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Take Photo
        </button>
        <input type="file" id="camera-input" accept="image/*" capture="environment">
      </div>

      <div id="upload-queue"></div>

      <button id="upload-btn" class="hidden">Upload</button>

      <div id="toast" class="hidden"></div>

      <!-- Upload History (from this device) -->
      <div id="history-section" class="hidden">
        <div id="history-header">
          <h2>Your Uploads</h2>
          <span id="history-count"></span>
        </div>
        <div id="history-list"></div>
        <button id="clear-history-btn" class="secondary-btn hidden">Clear History</button>
      </div>
    </div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "@aws-sdk/client-s3": "https://esm.sh/@aws-sdk/client-s3",
      "@aws-sdk/credential-provider-cognito-identity": "https://esm.sh/@aws-sdk/credential-provider-cognito-identity",
      "@aws-sdk/client-cognito-identity": "https://esm.sh/@aws-sdk/client-cognito-identity"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
